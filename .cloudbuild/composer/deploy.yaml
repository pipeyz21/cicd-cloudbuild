---
steps:
  # 1. Copiar DAGs GCS bucket de Composer
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'deploy-dags'
    args: ['-m', 'cp', '-r', 'dags/*.py', 'gs://${_DAGS_BUCKET}/dags/']

  # 2. Esperar sincronización
  - name: 'bash'
    args: ['sleep', '60']

  # 3. Verificar en Composer
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'verify-deployment'
    script: |
      gcloud composer environments run ${_COMPOSER_ENV} \
        --location ${_COMPOSER_LOCATION} \
        --project ${_PROJECT}
        dags list

  # 4. Notificar despliegue exitoso -> Futuro
  - name: 'deploy-notify'
    id: 'notify-success'
    args: ['echo', 'Deployment successful!']

options:
  logging: CLOUD_LOGGING_ONLY